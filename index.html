<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kuya</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb,#dc2626);
font-family:'Lora',serif;
cursor:pointer;
}

/* Basketball */

.ball{
position:absolute;
width:130px;
height:130px;
background:radial-gradient(circle at 40% 40%,#ff8a3c,#d35400);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
opacity:0;
transform:scale(.5);
transition:.6s;
}

/* show ball */
.ball.show{
opacity:1;
transform:scale(1);
}

/* message card */

.card{
position:absolute;
background:white;
padding:40px;
width:90%;
max-width:720px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
opacity:0;
transform:scale(.85);
transition:.6s;
}

.card.show{
opacity:1;
transform:scale(1);
}

/* fonts */

h1{
font-family:'Montserrat',sans-serif;
font-size:36px;
color:#dc2626;
margin-bottom:20px;
}

#message{
font-size:18px;
line-height:1.7;
white-space:pre-line;
color:#333;
}

.quote{
margin-top:28px;
font-style:italic;
font-size:19px;
text-align:center;
color:#555;
}

/* cursor */

.cursor{
display:inline-block;
width:2px;
background:#dc2626;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="ball" id="ball">🏀</div>

<div class="card" id="card">
<h1>Hello kuya!</h1>

<div id="message"></div>
<div id="quote"></div>

<span class="cursor"></span>
</div>

<script>

const messageText = `Char, hiak ngayan it lagas haat HAHAHAHAHA. First, I want to congratulate you on completing your highschool life HAHAHA. Then, good luck hit imo college endeavors, always remember nga aadi la kami para haiyo. PS. Ayaw na kami pagsinungguda (lolz)

I want to thank you for being one of the pillars kun hin-o maak yana, naging usa ka han mga nagshape haak nga maging better version hitak sarili.

Tim college life is magiging usa nga rollercoaster ride, danay aadi ha igbaw danay aat ha ilarom. But, never lose yourself in the process. Enjoy your college life, kasi after that, sasampalon ka na hit katotohanan. Mas damo na nga responsibilities tim sasaluhon.

Always remember nga we are rooting for your success!
`;

const quoteText = `"Be the best kupal version of yourself!"`;

let i = 0;

function typeMessage(){
if(i < messageText.length){
document.getElementById("message").innerHTML += messageText.charAt(i);
i++;
setTimeout(typeMessage,25);
}else{
typeQuote();
}
}

let q = 0;

function typeQuote(){
if(q < quoteText.length){
document.getElementById("quote").innerHTML =
'<div class="quote">' + quoteText.substring(0,q+1) + '</div>';
q++;
setTimeout(typeQuote,35);
}
}

/* click anywhere */

document.body.addEventListener("click",function(){

const ball=document.getElementById("ball");

if(!ball.classList.contains("show")){
ball.classList.add("show");

setTimeout(()=>{
document.getElementById("card").classList.add("show");
typeMessage();
},500);

}

},{once:true});

</script>

</body>
</html>
